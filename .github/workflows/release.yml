name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version part to bump"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Determine current version
        id: current_version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          latest_tag=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
          if [ -z "$latest_tag" ]; then
            current_version=$(node -p "require('./package.json').version")
          else
            current_version="${latest_tag#v}"
          fi
          echo "value=$current_version" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump_version
        shell: bash
        run: |
          set -euo pipefail
          new_version=$(node ./.github/scripts/bump-version.mjs "${{ inputs.version }}" "${{ steps.current_version.outputs.value }}")
          echo "New version: $new_version"
          echo "value=$new_version" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app (standalone executable, no installer)
        run: npm run tauri build -- --no-bundle

      - name: Stage release executable
        id: artifact
        shell: pwsh
        run: |
          $version = "${{ steps.bump_version.outputs.value }}"
          $source = "src-tauri/target/release/operation-wizard.exe"
          if (-not (Test-Path $source)) {
            throw "Build output not found at $source"
          }
          $dest = "Operation-Wizard-v$version.exe"
          Copy-Item $source $dest
          echo "path=$dest" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump_version.outputs.value }}
          name: v${{ steps.bump_version.outputs.value }}
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.path }}
